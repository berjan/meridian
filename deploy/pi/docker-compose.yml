# Meridian Docker stack tailored for the Pi coding agent.
#
# Builds the proxy from the repository root. Two deployment modes selected
# via environment variables (set in deploy/pi/.env or your shell):
#
#   Local (default) — Pi and Meridian on the same machine:
#     MERIDIAN_BIND_HOST=127.0.0.1   (default)
#     MERIDIAN_API_KEY=              (default — no auth needed on loopback)
#
#   Shared on LAN — one Meridian server, multiple Pi clients:
#     MERIDIAN_BIND_HOST=0.0.0.0
#     MERIDIAN_API_KEY=<long-random-secret>   (REQUIRED — clients must send it)
#
# Usage (from this directory):
#   ./start.sh   # build + run + import Pi OAuth credentials
#   ./status.sh  # show container + /health
#   ./stop.sh    # stop containers (volumes preserved)
#
# WARNING: never set MERIDIAN_BIND_HOST=0.0.0.0 without also setting
# MERIDIAN_API_KEY. start.sh enforces this.

name: meridian

services:
  # Volumes are created as root by Docker. Fix ownership before the proxy
  # (running as uid 1000 / claude) tries to write to them.
  init:
    image: busybox
    user: root
    volumes:
      - claude-auth:/home/claude/.claude
      - meridian-config:/home/claude/.config/meridian
      - meridian-cache:/home/claude/.cache/meridian
    entrypoint:
      - sh
      - -c
      - >-
        chown -R 1000:1000 /home/claude/.claude /home/claude/.config/meridian /home/claude/.cache/meridian
    restart: "no"

  proxy:
    build:
      # Build from the repo root so the Dockerfile, src/, bin/, etc. are in context.
      context: ../..
    image: meridian:local
    user: "claude"
    depends_on:
      init:
        condition: service_completed_successfully
    ports:
      # Bind interface controlled by .env (defaults to loopback only).
      # 0.0.0.0 exposes Meridian on the LAN — REQUIRES MERIDIAN_API_KEY.
      - "${MERIDIAN_BIND_HOST:-127.0.0.1}:3456:3456"
    environment:
      MERIDIAN_HOST: 0.0.0.0
      MERIDIAN_PORT: "3456"
      # When non-empty, all /v1/* and admin routes require this key in
      # x-api-key or Authorization: Bearer. /health and / stay open.
      MERIDIAN_API_KEY: ${MERIDIAN_API_KEY:-}
      # Pi mimics Claude Code's User-Agent, so adapter detection needs help.
      MERIDIAN_DEFAULT_AGENT: pi
      # Pi executes its own tools; Meridian forwards tool_use blocks to the client.
      MERIDIAN_PASSTHROUGH: "1"
      # The SDK subprocess just needs a container-local cwd that exists.
      # The model still receives Pi's real host cwd as clientWorkingDirectory.
      MERIDIAN_WORKDIR: /app
      MERIDIAN_TELEMETRY_PERSIST: "1"
      MERIDIAN_TELEMETRY_DB: /home/claude/.config/meridian/telemetry.db
    volumes:
      - claude-auth:/home/claude/.claude
      - meridian-config:/home/claude/.config/meridian
      - meridian-cache:/home/claude/.cache/meridian
    restart: unless-stopped

volumes:
  claude-auth:
  meridian-config:
  meridian-cache:
